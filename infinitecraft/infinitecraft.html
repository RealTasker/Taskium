<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Infinite Craft</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="infinitecraft.css"/>
<link rel="stylesheet" href="../nav.css"/>
</head>
<body>
<div class="bg">
  <nav class="game-nav">
    <a href="../index.html" class="nav-back" title="Back to home">←</a>
    <span class="nav-game-title">✨ Infinite Craft</span>
    <div class="nav-right-slot">
      <div class="nav-stat-pill">🧪 <strong id="count">4</strong> discovered</div>
      <button class="btn-reset" id="reset-btn">Reset</button>
    </div>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-search">
        <input type="text" id="search" placeholder="Search elements..." autocomplete="off"/>
      </div>
      <div class="elements-list" id="elements-list"></div>
    </aside>
    <main class="canvas" id="canvas">
      <div class="canvas-hint" id="canvas-hint">
        <div>Drag elements here</div>
        <div style="font-size:12px;margin-top:4px;opacity:0.5">or click one then click another to combine ✨</div>
      </div>
      <div class="canvas-items" id="canvas-items"></div>
      <div class="result-toast" id="result-toast"></div>
    </main>
  </div>
</div>

<script src="recipes.js"></script>
<script src="../game-save.js"></script>
<script src="../game-bar.js"></script>
<script src="infinitecraft.js"></script>
<script src="../loading.js"></script>
</body>
</html>
